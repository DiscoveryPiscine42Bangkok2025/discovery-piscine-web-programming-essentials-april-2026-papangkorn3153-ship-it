<!DOCTYPE html>
<html>
<head>
    <title>Profile Cards</title>
</head>
<body style="background-color: #e9e9e9; display: flex; justify-content: center; padding-top: 50px;">

    <table border="0" width="700" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">
                <table border="0" bgcolor="#ffffff" width="280" style="border-radius: 15px; font-family: sans-serif; padding: 20px; text-align: center; box-shadow: 0px 4px 8px rgba(0,0,0,0.1);">
                    <tr>
                        <td>
                            <h2>User Profile 1</h2>
                            <br>
                            <img src="https://via.placeholder.com/120" alt="Profile 1" width="120" style="border-radius: 50%;">
                            <h3>@alex_dev</h3>
                            <p><i>Full Stack Wizard</i></p>

                            <table border="0" align="center">
                                <tr>
                                    <td><img src="https://cdn-icons-png.flaticon.com/24/25/25231.png" width="20" alt="GH"></td>
                                    <td>&nbsp;</td> <td><img src="https://cdn-icons-png.flaticon.com/24/174/174857.png" width="20" alt="LI"></td>
                                </tr>
                            </table>
                            <br>
                            <a href="mailto:alex@example.com"><button style="padding: 10px 20px; cursor: pointer;">Contact</button></a>
                        </td>
                    </tr>
                </table>
            </td>

            <td align="center">
                <table border="0" bgcolor="#ffffff" width="280" style="border-radius: 15px; font-family: sans-serif; padding: 20px; text-align: center; box-shadow: 0px 4px 8px rgba(0,0,0,0.1);">
                    <tr>
                        <td>
                            <h2>User Profile 2</h2>
                            <br>
                            <img src="https://via.placeholder.com/120" alt="Profile 2" width="120" style="border-radius: 50%;">
                            <h3>@sam_design</h3>
                            <p><i>UI/UX Enthusiast</i></p>

                            <table border="0" align="center">
                                <tr>
                                    <td><img src="https://cdn-icons-png.flaticon.com/24/25/25231.png" width="20" alt="GH"></td>
                                    <td>&nbsp;</td> <td><img src="https://cdn-icons-png.flaticon.com/24/733/733579.png" width="20" alt="TW"></td>
                                </tr>
                            </table>
                            <br>
                            <a href="mailto:sam@example.com"><button style="padding: 10px 20px; cursor: pointer;">Contact</button></a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
